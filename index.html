    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap');
      body, html{
        background: #000;
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: 'Source Sans 3';
        color: #fff;
        font-size: 20px;
      }
      .modal{
        position: fixed;
        background: #000e;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        display: none;
        z-index: 1000;
      }
      .skyboxPickerFrame[focus]{
        outline: none;
      }
      .skyboxPickerFrame{
        width: 100vw;
        height: 100vh;
        margin: 0;
        border: none;
      }
      .closeButton{
        width: 100px;
        font-family: 'Source Sans 3';
        font-size: 16px;
        border-radius: 10px;
        background: #422;
        color: #f88;
        position: fixed;
        top: 0px;
        right: 20px;
        cursor: pointer;
      }
      .header{
        padding: 5px;
        min-height: 16px;
        line-height: 1em;
        background: linear-gradient(90deg, #000, #468, #40f);
        border-bottom: 1px solid #4688;
      }
      #main{
        display: flex;
        flex-wrap: wrap;
        justify-content: space-evenly;
      }
      .thumb{
        width: 200px;
        height: 150px;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center center;
        background-color: transparent;
        border-radius: 10px;
        border: 1px solid #4688;
        margin: 5px;
        cursor: pointer;
        align-self: flex-start;
      }
    </style>
  </head>

      const DrawGyroscope = () => {
        var fs
        var gyroYaw = renderer.yaw
        var gyroPitch = renderer.pitch
        var gyroPosX = c.width - gyroSize * 2 + gyroClusterOffsetX
        var gyroPosY = gyroSize * 2 + menuRows *
            menuBarHeight + secondaryMenuRows *
            secondaryMenuBarHeight + gyroClusterOffsetY
        var sd =32
        var gyrohover = false
        var zoomhover = false
        var movehover = false
        var gridhover = false
        var isohover = false
        var inchover = false
        var dechover = false

        var zoomPosX = gyroPosX + gyroSize/1.25
        var zoomPosY = gyroPosY + gyroSize * 1.75
        var zoomSize = gyroSize / 2.5
        var isoSize = gyroSize / 2.5
        var gridSize = gyroSize / 2.5
          
        var movePosX = gyroPosX + gyroSize/1.25
        var movePosY = gyroPosY + gyroSize * 1.75 + zoomSize * 3
        var moveSize = gyroSize / 2.5
        
        var isoPosX = gyroPosX + gyroSize/1.25
        var isoPosY = gyroPosY + gyroSize * 1.75 + zoomSize * 6
        var isoSize = gyroSize / 2.5
        
        var gridPosX = gyroPosX + gyroSize/1.25
        var gridPosY = gyroPosY + gyroSize * 1.75 + zoomSize * 9
        var gridSize = gyroSize / 2.5
        
        var incPosX = gyroPosX + gyroSize * 1.2
        var incPosY = gyroPosY - gyroSize
        var incSize = gyroSize / 6
        
        var decPosX = gyroPosX - gyroSize * 1.2
        var decPosY = gyroPosY - gyroSize
        var decSize = gyroSize / 6
        
        var gyroClusterHandle = [
          [gyroPosX - gyroSize*1.45, gyroPosY - gyroSize*1.33],
          [gyroPosX - gyroSize*1.45, gyroPosY - gyroSize*1.75],
          [gyroPosX + gyroSize*1.45, gyroPosY - gyroSize*1.75],
          [gyroPosX + gyroSize*1.45, gyroPosY - gyroSize*1.33],
        ]
        var gyroClusterBody = [
          [gyroPosX - gyroSize*1.45, gyroPosY - gyroSize*1.33],
          [gyroPosX - gyroSize*1.45, gyroPosY + gyroSize*.8],
          [gyroPosX + gyroSize/8, gyroPosY + gyroSize*1.6],
          [gyroPosX + gyroSize/8, gyroPosY + gyroSize*6],
          [gyroPosX + gyroSize*1.45, gyroPosY + gyroSize*6],
          [gyroPosX + gyroSize*1.45, gyroPosY - gyroSize*1.33],
        ]
        var gyroHandleHover = Coordinates.PointInPoly2D(mx, my, gyroClusterHandle)
        if(gyroClusterMoveInProgress || gyroHandleHover ||
           Coordinates.PointInPoly2D(mx, my, gyroClusterBody) ||
           orientationInProgress || moveInProgress || zoomInProgress){
          if(gyroHandleHover || gyroClusterMoveInProgress){
            if(clickReady && renderer.mouseButton == 1){
              clickReady = false
              omx = mx
              omy = my
              gyroClusterMoveInProgress = true
            }
            if(gyroClusterMoveInProgress){
              gyroClusterOffsetX += mx - omx
              gyroClusterOffsetY += my - omy
              omx = mx
              omy = my
            }
          }
          ctx.lineWidth = gyroSize/20
          ctx.strokeStyle = '#fff2'
          ctx.fillStyle = gyroHandleHover || gyroClusterMoveInProgress ? '#8868' : '#8862'
          ctx.beginPath()
          gyroClusterHandle.forEach(v=>ctx.lineTo(v[0],v[1]))
          ctx.stroke()
          ctx.fill()
          ctx.globalAlpha = gyroHandleHover || gyroClusterMoveInProgress ? .5 : .25
          var img = assets.filter(v => v.name == 'gyro cluster handle png')[0].resource
          x = gyroPosX - gyroSize*1.45
          y = gyroPosY - gyroSize*1.75
          var wd = (gyroPosX + gyroSize*1.45) - x
          var hgt = (gyroPosY - gyroSize*1.33) - y
          ctx.drawImage(img, x, y, wd, hgt)
          ctx.globalAlpha = 1
          
          
          ctx.strokeStyle = '#fff2'
          ctx.fillStyle = '#0002'
          ctx.beginPath()
          gyroClusterBody.forEach(v=>ctx.lineTo(v[0],v[1]))
          ctx.closePath()
          ctx.fill()
          ctx.stroke()
        }
        
        
        if(clickReady && !(moveInProgress || zoomInProgress) && 
           Math.hypot(gyroPosX-mx, gyroPosY-my) < gyroSize*1.25 || orientationInProgress){
          gyrohover = true
          ctx.beginPath()
          for(var j=0; j<sd; j++){
            x = gyroPosX + S(p=Math.PI*2/sd*j) * gyroSize * 1.25
            y = gyroPosY + C(p) * gyroSize * 1.25
            ctx.lineTo(x, y)
          }
          ctx.fillStyle = '#fff3'
          ctx.fill()
        }else if(clickReady && !(moveInProgress || orientationInProgress) &&
                   Math.hypot(zoomPosX-mx, zoomPosY-my) < zoomSize*1.25 || zoomInProgress){
          zoomhover = true
          if(zoomhover && renderer.mouseButton == 1 || zoomInProgress){
            if(clickReady){
              clickReady = false
              zoomInProgress = true
              omx = mx
              omy = my
            }
            
            targD -= (omy-my)/zoomHoming
            
            omx = mx
            omy = my
          }
        }else if(clickReady && !(zoomInProgress || orientationInProgress) &&
                   Math.hypot(movePosX-mx, movePosY-my) < moveSize*1.25 || moveInProgress){
          movehover = true
          if(movehover && renderer.mouseButton == 1 || moveInProgress){
            if(clickReady){
              clickReady = false
              moveInProgress = true
              omx = mx
              omy = my
            }
            
            var x1 = 0
            var y1 = 1
            var z1 = 0
            var x2 = 1
            var y2 = 0
            var z2 = 0
            p = Math.atan2(y1,z1) + renderer.pitch
            d = Math.hypot(y1,z1)
            y1 = S(p) * d
            z1 = C(p) * d
            p = Math.atan2(y2,z2) + renderer.pitch
            d = Math.hypot(y2,z2)
            y2 = S(p) * d
            z2 = C(p) * d

            p = Math.atan2(x1,z1) - renderer.yaw
            d = Math.hypot(x1,z1)
            x1 = S(p) * d
            z1 = C(p) * d
            p = Math.atan2(x2,z2) - renderer.yaw
            d = Math.hypot(x2,z2)
            x2 = S(p) * d
            z2 = C(p) * d
            
            targX -= x2 * (omx-mx) / moveHoming
            targY -= y2 * (omx-mx) / moveHoming
            targZ -= z2 * (omx-mx) / moveHoming

            targX += x1 * (omy-my) / moveHoming
            targY += y1 * (omy-my) / moveHoming
            targZ += z1 * (omy-my) / moveHoming

            
            omx = mx
            omy = my
          }
        }else if(clickReady && !(moveInProgress || zoomInProgress || orientationInProgress) &&
                   Math.hypot(isoPosX-mx, isoPosY-my) < isoSize*1.25){
          isohover = true
          if(isohover && renderer.mouseButton == 1 && clickReady){
            clickReady = false
            isometric = !isometric
          }
        }else if(clickReady && !(moveInProgress || zoomInProgress || orientationInProgress) &&
                   Math.hypot(gridPosX-mx, gridPosY-my) < gridSize*1.25){
          gridhover = true
          if(gridhover && renderer.mouseButton == 1 && clickReady){
            clickReady = false
            showGrid = !showGrid
          }
        }else if(clickReady && !(moveInProgress || zoomInProgress || orientationInProgress) &&
                   Math.hypot(incPosX-mx, incPosY-my) < incSize*1.25){
          inchover = true
          if(inchover && renderer.mouseButton == 1 && clickReady){
            gyroSize *= 1.015
            gyroSize = Math.min(maxGyroSize, gyroSize)
            var gs = gyroSize
            var gpx = c.width - gyroSize * 2 + gyroClusterOffsetX
            var gpy = gyroSize * 2 + menuRows *
                menuBarHeight + secondaryMenuRows *
                secondaryMenuBarHeight + gyroClusterOffsetY

            gyroClusterOffsetX += mx - (gpx + gs * 1.2)
            gyroClusterOffsetY += my - (gpy - gs)
          }
        }else if(clickReady && !(moveInProgress || zoomInProgress || orientationInProgress) &&
                   Math.hypot(decPosX-mx, decPosY-my) < decSize*1.25){
          dechover = true
          if(dechover && renderer.mouseButton == 1 && clickReady){
            gyroSize /= 1.015
            gyroSize = Math.max(minGyroSize, gyroSize)
            var gs = gyroSize
            var gpx = c.width - gyroSize * 2 + gyroClusterOffsetX
            var gpy = gyroSize * 2 + menuRows *
                menuBarHeight + secondaryMenuRows *
                secondaryMenuBarHeight + gyroClusterOffsetY

            gyroClusterOffsetX += mx - (gpx - gs * 1.2)
            gyroClusterOffsetY += my- (gpy - gs)
          }
        }else if(clickReady && renderer.mouseButton == 1){
          clickReady = false
        }
        
        ctx.beginPath()
        for(var j=0; j<sd; j++){
          x = zoomPosX + S(p=Math.PI*2/sd*j) * zoomSize * 1.25
          y = zoomPosY + C(p) * zoomSize * 1.25
          ctx.lineTo(x, y)
        }
        ctx.fillStyle = zoomhover || zoomInProgress ? '#fff3' : '#222'
        ctx.fill()
        ctx.globalAlpha = .66
        var img = assets.filter(v => v.name == 'zoom png')[0].resource
        ctx.drawImage(img, zoomPosX-zoomSize*.75, zoomPosY-zoomSize*.75,
                        zoomSize*1.5, zoomSize*1.5)
        ctx.globalAlpha = 1
        
        ctx.beginPath()
        for(var j=0; j<sd; j++){
          x = movePosX + S(p=Math.PI*2/sd*j) * moveSize * 1.25
          y = movePosY + C(p) * moveSize * 1.25
          ctx.lineTo(x, y)
        }
        ctx.fillStyle = movehover || moveInProgress ? '#fff3' : '#222'
        ctx.fill()
        ctx.globalAlpha = .66
        var img = assets.filter(v => v.name == 'hand png')[0].resource
        ctx.drawImage(img, movePosX-moveSize, movePosY-moveSize, moveSize*2, moveSize*2)
        ctx.globalAlpha = 1
        
        ctx.beginPath()
        for(var j=0; j<sd; j++){
          x = isoPosX + S(p=Math.PI*2/sd*j) * isoSize * 1.25
          y = isoPosY + C(p) * isoSize * 1.25
          ctx.lineTo(x, y)
        }
        ctx.fillStyle = isohover ? '#fff3' : '#222'
        ctx.fill()
        ctx.globalAlpha = .66
        var img = assets.filter(v => v.name == (isometric ? 'isometric png' : 'perspective png'))[0].resource
        ctx.drawImage(img, isoPosX-isoSize, isoPosY-isoSize, isoSize*2, isoSize*2)
        ctx.globalAlpha = 1
        
        ctx.beginPath()
        for(var j=0; j<sd; j++){
          x = gridPosX + S(p=Math.PI*2/sd*j) * gridSize * 1.25
          y = gridPosY + C(p) * gridSize * 1.25
          ctx.lineTo(x, y)
        }
        ctx.fillStyle = gridhover ? '#fff3' : '#222'
        ctx.fill()
        ctx.globalAlpha = .66
        var img = assets.filter(v => v.name == (showGrid ? 'grid png' : 'no-grid png'))[0].resource
        ctx.drawImage(img, gridPosX-gridSize, gridPosY-gridSize, gridSize*2, gridSize*2)
        ctx.globalAlpha = 1
        
        ctx.font = (fs=gyroSize/1.5) + 'px "Source Sans 3"'
        ctx.textAlign = 'center'
        ctx.beginPath()
        for(var j=0; j<sd; j++){
          x = incPosX + S(p=Math.PI*2/sd*j) * incSize * 1.25
          y = incPosY + C(p) * incSize * 1.25
          ctx.lineTo(x, y)
        }
        ctx.fillStyle = inchover ? '#fff3' : '#222'
        ctx.fill()
        ctx.fillStyle = '#ffa'
        ctx.fillText('+', incPosX, incPosY+fs/3)

        ctx.beginPath()
        for(var j=0; j<sd; j++){
          x = decPosX + S(p=Math.PI*2/sd*j) * decSize * 1.25
          y = decPosY + C(p) * decSize * 1.25
          ctx.lineTo(x, y)
        }
        ctx.fillStyle = dechover ? '#fff3' : '#222'
        ctx.fill()
        ctx.fillStyle = '#ffa'
        ctx.fillText('-', decPosX, decPosY+fs/4)
        
        var tx, ty, tz
        var components = [
          { tx, ty, tz, verts:[], label: '' },
          { tx, ty, tz, verts:[], label: '' },
          { tx, ty, tz, verts:[], label: '' },
          { tx, ty, tz, verts:[], label: '' },
          { tx, ty, tz, verts:[], label: '' },
          { tx, ty, tz, verts:[], label: '' },
        ]
        for(var i = 0; i < 6; i ++){
          if(i<4){
            p = Math.PI*2/4*i + gyroYaw + Math.PI
            tx = S(p) * gyroSize
            ty = 0
            tz = C(p) * gyroSize
            p = Math.atan2(ty, tz) + gyroPitch
            d = Math.hypot(ty, tz)
            ty = S(p) * d
            tz = C(p) * d
            tx += gyroPosX
            ty += gyroPosY
          }else{
            tx = 0
            ty = gyroSize * (i==4 ? -1 : 1)
            tz = 0
            p = Math.atan2(ty, tz) + gyroPitch
            d = Math.hypot(ty, tz)
            ty = S(p) * d
            tz = C(p) * d
            tx += gyroPosX
            ty += gyroPosY
          }
          components[i].tx = tx
          components[i].ty = ty
          components[i].tz = tz
          for(var j=0; j<sd; j++){
            x = tx + S(p=Math.PI*2/sd*j) * gyroSize/5
            y = ty + C(p) * gyroSize/5
            components[i].verts.push([x,y])
          }
          switch(i){
            case 0:
              components[i].primary = true
              components[i].label = 'Y'
              components[i].fillStyle = '#4a0'
              components[i].strokeStyle = '#4a0'
            break
            case 1:
              components[i].primary = true
              components[i].label = 'X'
              components[i].fillStyle = '#f44'
              components[i].strokeStyle = '#f44'
            break
            case 2:
              components[i].primary = false
              components[i].label = '-Y'
              components[i].fillStyle = '#340'
              components[i].strokeStyle = '#4a0'
            break
            case 3:
              components[i].primary = false
              components[i].label = '-X'
              components[i].fillStyle = '#433'
              components[i].strokeStyle = '#f44'
            break
            case 4:
              components[i].primary = true
              components[i].label = 'Z'
              components[i].fillStyle = '#26f'
              components[i].strokeStyle = '#26f'
            break
            case 5:
              components[i].primary = false
              components[i].label = '-Z'
              components[i].fillStyle = '#138'
              components[i].strokeStyle = '#26f'
            break
          }
          ctx.font = (fs=20 * (gyroSize/50)) + 'px "Source Sans 3"'
          components.sort((a, b) => b.tz - a.tz).map(component => {
            if(component.primary){
            ctx.beginPath()
              ctx.lineTo(gyroPosX, gyroPosY)
              ctx.lineTo(component.tx, component.ty)
              ctx.lineWidth = 4
              ctx.strokeStyle = component.strokeStyle
              ctx.stroke()
            }
            ctx.beginPath()
            component.verts.map(pair => {
              ctx.lineTo(pair[0], pair[1])
            })
            ctx.fillStyle = component.fillStyle
            ctx.strokeStyle = component.strokeStyle
            ctx.closePath()
            ctx.stroke()
            ctx.fill()
            component.hover = Math.hypot(mx-component.tx, my-component.ty) < gyroSize/5
            if(!(zoomInProgress || moveInProgress) && gyrohover && renderer.mouseButton == 1
               || orientationInProgress){
              if(clickReady){
                clickReady = false
                orientationInProgress = true
                omx = mx
                omy = my
              }
              var flip = renderer.pitch > Math.PI/2 ||
                         renderer.pitch < -Math.PI/2
              targYaw -= (mx - omx) / 100 * (flip ? -1 : 1)
              targPitch -= (my - omy) / 100
              if(mx-omx || my-omy) axisAligned = ''
              omx = mx
              omy = my
            }
            if(component.primary || component.hover){
              ctx.fillStyle = component.hover ? '#fff' : '#000'
              ctx.fillText(component.label, component.tx, component.ty + fs/3)
              
              
              if(component.hover && mouseUp && clickReady){
                mouseUp = false
                switch(component.label){
                  case 'X':
                    if(axisAligned == 'X'){
                      axisAligned = '-X'
                      targYaw = Math.PI/2
                      targPitch = 0
                    }else{
                      axisAligned = 'X'
                      targYaw = -Math.PI/2
                      targPitch = 0
                    }
                  break
                  case 'Y':
                    if(axisAligned == 'Y'){
                      axisAligned = '-Y'
                      targYaw = 0
                      targPitch = Math.PI
                    }else{
                      axisAligned = 'Y'
                      targYaw = 0
                      targPitch = 0
                    }
                  break
                  case 'Z':
                    if(axisAligned == 'Z'){
                      axisAligned = '-Z'
                      targYaw = 0
                      targPitch = Math.PI/2
                    }else{
                      axisAligned = 'Z'
                      targYaw = 0
                      targPitch = -Math.PI/2
                    }
                  break
                  case '-X':
                    if(axisAligned == '-X'){
                      axisAligned = 'X'
                      targYaw = -Math.PI/2
                      targPitch = 0
                    }else{
                      axisAligned = '-X'
                      targYaw = Math.PI/2
                      targPitch = 0
                    }
                  break
                  case '-Y':
                    if(axisAligned == '-Y'){
                      axisAligned = 'Y'
                      targYaw = -Math.PI
                      targPitch = 0
                    }else{
                      axisAligned = '-Y'
                      targYaw = Math.PI
                      targPitch = 0
                    }
                  break
                  case '-Z':
                    if(axisAligned == '-Z'){
                      axisAligned = 'Z'
                      targYaw = 0
                      targPitch = -Math.PI/2
                    }else{
                      axisAligned = '-Z'
                      targYaw = 0
                      targPitch = Math.PI/2
                    }
                  break
                }
              }
            }
          })
        }
      }

      const CloseAllSubMenus = menus => {
        (menus?.items ? menus.items : menus).map(menu => {
          menu.showSubs = false
          CloseAllSubMenus(menu.items)
        })
      }
      
      const MenuIsOpen = menu => {
        const recurse = item => {
          if(item.showSubs) return true
          var ret = false
          item.items.map(item => {
            if(recurse(item)) ret = true
          })
          return ret
        }
        return recurse(menu)
      }

      const DrawMainMenus = () => {
        ctx.font = (fs=24) + 'px "Source Sans 3"'
        var height = fs * 1.2 + menuPadding
        menuBarHeight = height
        hovering = false
        var mP_ = menuPadding
        var h_ = height
        const DrawMenu = (menu, depth=0, offsetX=0, offsetY=0, parentName='', secondary=false) => {
          var menuPadding = fs/24*mP_
          var height = fs/26*h_
          if(depth){
            menu.items.map((item, mIdx) => {

              item.textWidth = ctx.measureText(item.name).width
              var width = item.textWidth + menuPadding * 4
              item.width = width - menuPadding
              item.height = height

              var vy = (depth ? (1+mIdx) * height/1.00-fs/8: 0) + (secondary ? menuBarHeight/(depth>1?1.4:1): 0) + 2

              ctx.fillStyle = '#222'
              if(depth > 1){
                ctx.beginPath()
                ctx.roundRect(menu.x - menuPadding/2 + offsetX,
                              menu.y + vy + 2 + offsetY - fs/10,
                              width - menuPadding,
                              (fs*1.25+menuPadding)*menuRows, [8])
                ctx.fill()
              }else{
                ctx.fillRect(menu.x - menuPadding/2 + offsetX,
                             menu.y + vy + offsetY,
                             width - menuPadding,
                             (fs*1.25+menuPadding)*menuRows)
              }

              menu.items[mIdx].x = menu.x + menuPadding/2 + offsetX
              menu.items[mIdx].y = menu.y + vy - 2 + offsetY - (secondary ? height : 0)

              if(Hover(item, 0, secondary)){
                menu.items.map(item => item.showSubs = false)
                item.showSubs = true
                ctx.fillStyle = '#286'
                ctx.beginPath()
                ctx.roundRect(menu.x + offsetX, menu.y + offsetY + vy + fs/8, width-menuPadding*2, height-menuPadding/2, [8])
                ctx.fill()
                if(renderer.mouseButton == 1 && clickReady &&
                   !item.items.length) {
                  eval(item.script)
                  CloseAllMenus()
                  clickReady = false
                }
                DrawMenu(item, depth+1, width-menuPadding*2, -height+2, item.name, secondary)
              }else{
                item.showSubs = false
              }

              ctx.strokeStyle = '#000'
              ctx.lineWidth = 3
              ctx.strokeText(item.name,
                           menu.x + offsetX + width/2 - menuPadding,
                            menu.y + offsetY -menuPadding/4 +
                           fs + menuPadding/2 - fs/32 + vy)
              ctx.fillStyle = '#fff'
              ctx.fillText(item.name, menu.x + offsetX + width/2 - menuPadding, menu.y + offsetY -menuPadding/4 +
                           fs + menuPadding/2 - fs/32 + vy)
            })
          }else{
            var posX = 0
            menu[0].items.map((item, mIdx) => {
              item.textWidth = ctx.measureText(item.name).width
              var width = item.textWidth + menuPadding * 4
              item.width = width - menuPadding * 2
              item.height = secondary ? height*1.1 : height
              var vy = (depth ? (1+mIdx) * height : -fs/8) + (secondary ? menuBarHeight+fs/8: fs/8) + 2
              item.x = posX + menuPadding/2
              item.y = menuPadding/2
              posX += ctx.measureText(item.name).width + menuPadding * 2.5
              if(Hover(item, 0, secondary)){
                menu[0].items.map(item => item.showSubs = false)
                item.showSubs = true
                ctx.fillStyle = '#286'
                ctx.beginPath()
                ctx.roundRect(item.x + offsetX, item.y + offsetY + vy, width-menuPadding*2, item.height-menuPadding, [8])
                ctx.fill()
                DrawMenu(item, depth+1, 0, 0, item.name, secondary)
              }else{
                item.showSubs = false
              }

              ctx.strokeStyle = '#000'
              ctx.lineWidth = 3
              ctx.strokeText(item.name,
                           item.x + offsetX + width/2 - menuPadding,
                           item.y + offsetY -menuPadding + fs +
                           menuPadding/2 + vy)
              ctx.fillStyle = '#fff'
              ctx.fillText(item.name, item.x + offsetX + width/2 - menuPadding,
                           item.y + offsetY -menuPadding +
                           fs + menuPadding/2 + vy)
            })
          }
        }


        if(1){
          var secondaryHeight = fs * 1.2 + menuPadding
          secondaryMenuBarHeight = height
          ctx.font = (fs=18) + 'px "Source Sans 3"'
          secondaryMenuRows = 1 + (menubarWidth/Math.max(menubarWidth, w) | 0)
          ctx.fillStyle = '#444'
          ctx.fillRect(0, menuBarHeight, w, (fs*1.25+menuPadding)*secondaryMenuRows)
          ctx.textAlign = 'center'
          DrawMenu(secondaryMenus, 0, 0, 0, '', true)
        }
        fs=24
        menuRows = 1 + (menubarWidth/Math.max(menubarWidth, w) | 0)
        ctx.fillStyle = '#222'
        ctx.fillRect(0, 0, w, (fs*1.25+menuPadding)*menuRows)
        ctx.textAlign = 'center'
        DrawMenu(menus)
        if(hovering) {
          clickReady = true
          renderer.mouseButton = -1
        }else{
          CloseAllMenus()
        }
      }


      var shapes = []
      var spriteArray
      var pointArray = Array(100).fill().map(v=>[1e5,1e5,1e5])
      var geoOptions = {
        shapeType: 'sprite',
        name: 'sprite array',
        map: 'https://srmcgann.github.io/Coordinates/resources/stars/star1.png',
      }
      await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
        Coordinates.ShapeFromArray(geometry, pointArray).then(async res => {
          spriteArray = res
          await backgroundShader.ConnectGeometry(res)
        })
      })  

      var geoOptions = {
        shapeType: 'dodecahedron',
        name: 'background',
        sphereize: 1,
        subs: 2,
        color: 0x333333,
        size: 5e3,
        colorMix: 1,
      }
      if(0)await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
        shapes.push(geometry)
        await flatShader.ConnectGeometry(geometry)
      })


      var shaderOptions = [
        {lighting: {type: 'ambientLight', value: .5}},
        { uniform: {
          type: 'phong',
          value: 0
        } },
        { uniform: {
          type: 'fog',
          color: 0x040404,
          value: 32,
        } }
      ]
      var gridShader = await Coordinates.BasicShader(renderer, shaderOptions)

      var cl = 1
      var rw = 1
      var sp = .02
      var pointArray = Array(cl*rw).fill().map((v, i) => {
        x = ((i%cl)-cl/2 + .5) * sp
        y = ((i/cl|0)-rw/2 + .5) * sp
        z = 0
        return [x, y, z]
      })
      var baseAxisVerts
      var geoOptions = {
        shapeType: 'obj',
        url: 'https://srmcgann.github.io/coordinates_workshop/assets/axes.obj?3',
        map: 'https://srmcgann.github.io/coordinates_workshop/assets/axes_texture.png?2',
        name: 'axes',
        scaleX: gridScale,
        scaleY: gridScale,
        scaleZ: gridScale,
        alpha: .9,
        alpha: 1,
        colorMix: 0,
      }
      await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
        baseAxisVerts = structuredClone(geometry.vertices)
        shapes.push(geometry)
        await gridShader.ConnectGeometry(geometry)
      })

      const LoadSceneShape = async (url, shapeType, map='', replace=true,
        subs='', sphereize=0) => {
        var newRefTexture = refTexture
        if(newRefTexture) newRefTexture += `?${1e5+Rn()*(1e6-1e5)|0}`
        
        
        var shaderOptions = [
          {lighting: {type: 'ambientLight', value: !!refTexture ? .2 : .6}},
          { uniform: {
            type: 'phong',
            value: !!newRefTexture ? .1 : .4
          } },
          { uniform: {
            type: 'reflection',
            map: newRefTexture,
            value: .3,
            involveCache: false,
        } },
          { uniform: {
            type: 'refraction2',
            angleOfRefraction: .2,
            map: newRefTexture,
            value: 1,
            involveCache: false,
          } },
        ]
        var newShader = await Coordinates.BasicShader(renderer, shaderOptions)
        var averageNormals=false, sphereize, subs
        if((shapeType == 'tetrahedron' ||
            shapeType == 'cube' ||
            shapeType == 'octahedron' ||
            shapeType == 'dodecahedron' ||
            shapeType == 'icosahedron')){
          if(sphereize){
            averageNormals = true
          }
        }else{
          subs = 0
          sphereize = 0
        }
        var geoOptions = {
          shapeType,
          url,
          map,
          sphereize,
          subs,
          name: 'scene shape',
          color: 0xffffff,
          colorMix: map?0:.25,
          averageNormals,
          involveCache: false,
          //rebindTextures: !!newRefTexture,
        }
        if(replace) shapes = shapes.filter(shape => shape.name != 'scene shape')
        shapes.filter(shape => shape.name != 'scene shape').map((shape, sIdx) => {
          shape.selected = false
        })
        await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
          geometry.hash = Coordinates.GenHash(renderer.t)
          geometry.selected = false
          shapes.push(geometry)
          //geometry.rebindTextures = true
          await newShader.ConnectGeometry(geometry)
          SetSkybox(refTexture)
        })
      }
      
      var cl = 4
      var rw = 4
      var sp = 10 * gridScale
      var pointArray = Array(cl*rw).fill().map((v, i) => {
        x = ((i%cl)-cl/2 + .5) * sp
        y = 0
        z = ((i/cl|0)-rw/2 + .5) * sp
        return [x, y, z]
      })
      var geoOptions = {
        shapeType: 'obj',
        url: 'https://srmcgann.github.io/coordinates_workshop/assets/grid.obj?2',
        name: 'world grid',
        alpha: 1,
        scaleX: gridScale,
        scaleY: gridScale,
        scaleZ: gridScale,
        color: 0x888888,
        colorMix: .5,
      }
      await Coordinates.LoadGeometry(renderer, geoOptions).then(async (geometry) => {
        Coordinates.ShapeFromArray(geometry, pointArray).then(async res => {
          shapes.push(res)
          await gridShader.ConnectGeometry(res)
        })
      })


      if(0) Coordinates.LoadFPSControls(renderer, {
        //flyMode: true,
        useKeys: false,
        mSpeed: .5,
        showCrosshair: false,
        crossharSel: 2,
        crosshairSize: .5,
      })

      const Hover = (menu, depth=0, secondary) => {
        if(secondary && MenuIsOpen(menus[0])) return

        var offsetX = 0
        var offsetY = secondary ? (fs*1.25+menuPadding)*menuRows : 0
        var hover, hoverMargin = menuPadding * 4
        var val = menu.showSubs && !!menu.items.filter(sub => Hover(sub, depth+1,
                                                              secondary)).length
        if(depth){
          hover = mx > menu.x + offsetX - hoverMargin &&
            mx < menu.x + offsetX + menu.width + hoverMargin &&
            my > menu.y + offsetY - hoverMargin &&
            my < menu.y + offsetY + menu.height +hoverMargin
        }else{
          hover = mx > menu.x + offsetX && mx < menu.x + menu.width + offsetX &&
            my > menu.y + offsetY && my < menu.y + menu.height + offsetY
        }

        var ret = hover || val
        if(ret) hovering = true
        return ret
      }

      var clickReady = true

      await ClearAll()
      await SetSkybox(greyPixel)
      await LoadSceneShape ('', 'dodecahedron', '', false, 1, 0)
      setTimeout(() => {
        //axisAligned = 'Z'
      }, 0)
      

      window.Draw = () => {

        var t = renderer.frameCount / 60
        renderer.Clear()
        ctx.clearRect(0,0,w, h)
        
        DoKeys()
        
        while(Math.abs(targYaw-renderer.yaw) > Math.PI){
          renderer.yaw += targYaw < renderer.yaw ? -Math.PI*2 : Math.PI*2
        }
        while(Math.abs(targPitch-renderer.pitch) > Math.PI){
          renderer.pitch += targPitch < renderer.pitch ? -Math.PI*2 : Math.PI*2
        }
        renderer.yaw += (targYaw - renderer.yaw) / gyroHoming
        renderer.pitch += (targPitch - renderer.pitch) / gyroHoming

        if(renderer.pitch > Math.PI) renderer.pitch -= Math.PI*2
        if(renderer.pitch <-Math.PI) renderer.pitch += Math.PI*2

        renderer.offsetX += (targX - renderer.offsetX) / homing
        renderer.offsetY += (targY - renderer.offsetY) / homing
        renderer.offsetZ += (targZ - renderer.offsetZ) / homing
        
        renderer.z += (targD - renderer.z) / homing


        var ohovering = hovering
        c = canvasTexture.c
        ctx = canvasTexture.ctx
        w = canvasTexture.c.width
        h = canvasTexture.c.height

        mx = renderer.mouseX
        my = renderer.mouseY
        
        renderer.fov = (axisAligned || isometric) ? 1e5 : ofov

        shapes.map((shape, sIdx) => {
          switch(shape.name){
            case 'axes':
              if(showGrid){
                if(axisAligned != oAxisAligned ||
                   axisAligned == 'X' || axisAligned == '-X' ||
                   axisAligned == 'Y' || axisAligned == '-Y'){
                   for(var i = 0; i < shape.vertices.length; i+=3){
                    x = baseAxisVerts[i+0]
                    y = baseAxisVerts[i+1]
                    z = baseAxisVerts[i+2]
                    if(axisAligned == 'X' || axisAligned == '-X'){
                      if(i<shape.vertices.length/2){
                        x = 1e5, y = 1e5, z = 1e5
                      }
                    }else if(axisAligned == 'Y' || axisAligned == '-Y'){
                      if(i>=shape.vertices.length/2){
                        x = 1e5, y = 1e5, z = 1e5
                      }
                    }
                    shape.vertices[i+0] = x
                    shape.vertices[i+1] = y
                    shape.vertices[i+2] = z
                  }
                }
                renderer.Draw(shape)
              }
            break
            case 'scene shape':
              if(1){
                /*
                var bounding = Coordinates.ShowBounding(shape, shape.renderer, false)
                
                if(Coordinates.PointInPoly2D(mx, my, bounding)){
                  shape.boundingColor = 0xff8800
                  Coordinates.ShowBounding(shape, renderer, true, -1,true, 0, 5)
                  if(clickReady && renderer.mouseButton == 1){
                    clickReady = false
                    shape.selected = !shape.selected
                  }
                }
                if(shape.selected){ 
                  shape.boundingColor = 0x00ff44
                  Coordinates.ShowBounding(shape, renderer, true, -1,true, 0, 10)
                }



GetShaderCoord = (vx, vy, vz, geometry, renderer,
                        nx=0, ny=0, nz=0, uvx=0, uvy=0,
                        equirectangularPlugin=false, omitSplitCheck=true,
                        splitCheckPass=0) => {

                */
                x = shape.x
                y = shape.y
                z = shape.z
                var ar = Coordinates.GetShaderCoord(x, y, z, shape,
                            {
                              x: renderer.offsetX,
                              y: renderer.offsetY,
                              z: renderer.offsetZ,
                              roll: renderer.roll,
                              pitch: renderer.pitch,
                              yaw: renderer.yaw,
                              cameraMode: 'fps',
                              width: renderer.width,
                              height: renderer.height,
                              offsetX: 0,
                              offsetY: 0,
                              offsetZ: 0,
                            })
                ctx.fillStyle = '#f00'
                ctx.fillRect(ar[0]-10, ar[1]-10,20,20)
                var cursorSprite = spriteArray.shapeData[0]
                if(1||ar){
                  //console.log(d = Math.hypot(mx - ar[0], my - ar[1]))
                  cursorSprite.x = shape.x - cursorSprite.ox
                  cursorSprite.y = shape.y - cursorSprite.oy
                  cursorSprite.z = shape.z - cursorSprite.oz
                }else{
                  cursorSprite.x = 0
                  cursorSprite.y = 0
                  cursorSprite.z = 0
                }
                
                renderer.Draw(spriteArray)
              }
              renderer.Draw(shape)
            break
            case 'world grid':
              if(showGrid){
                if(scrollGrid){
                  var p1 = -renderer.yaw
                  var p2 = -renderer.pitch + Math.PI/2
                  var camPosX = S(p1) * S(p2) * targD + renderer.offsetX
                  var camPosY = C(p2) * targD + renderer.offsetY
                  var camPosZ = C(p1) * S(p2) * targD + renderer.offsetZ
                  shape.shapeData.map((subShape, sIdx) => {
                    switch(axisAligned){
                      case 'X': case '-X':
                        if(camPosZ + subShape.wz > sp * (cl-2)){
                          subShape.z -= sp * cl
                        }
                        if(camPosZ + subShape.wz < -sp * (cl-2)){
                          subShape.z += sp * cl
                        }
                        if(-camPosY + subShape.wx > sp * (rw-2)){
                          subShape.x -= sp * rw
                        }
                        if(-camPosY + subShape.wx < -sp * (rw-2)){
                          subShape.x += sp * rw
                        }
                      break
                      case 'Y': case '-Y':
                        if(camPosX + subShape.wx > sp * (cl-2)){
                          subShape.x -= sp * cl
                        }
                        if(camPosX + subShape.wx < -sp * (cl-2)){
                          subShape.x += sp * cl
                        }
                        if(camPosY + subShape.wz > sp * (rw-2)){
                          subShape.z -= sp * rw
                        }
                        if(camPosY + subShape.wz < -sp * (rw-2)){
                          subShape.z += sp * rw
                        }
                      break
                      case 'Z': case '-Z': default:
                        if(camPosX + subShape.wx > sp * (cl-2)){
                          subShape.x -= sp * cl
                        }
                        if(camPosX + subShape.wx < -sp * (cl-2)){
                          subShape.x += sp * cl
                        }
                        if(camPosZ + subShape.wz > sp * (rw-2)){
                          subShape.z -= sp * rw
                        }
                        if(camPosZ + subShape.wz < -sp * (rw-2)){
                          subShape.z += sp * rw
                        }
                      break
                    }
                  })
                }
                if(axisAligned == 'Y' || axisAligned == '-Y'){
                  shape.roll = 0
                  shape.pitch = Math.PI/2
                  shape.yaw = 0
                }else if(axisAligned == 'X' || axisAligned == '-X'){
                  shape.roll= Math.PI/2
                  shape.pitch= 0
                  shape.yaw=0
                }else{
                  shape.roll = shape.pitch = shape.yaw = 0
                }
                renderer.Draw(shape)
              }
            break
            case 'background':
              renderer.Draw(shape)
              break
            default:
              renderer.Draw(shape)
              break
          }
        })


        // main menu

        DrawMainMenus()
        
        if(hovering){
          document.body.style.cursor = 'pointer'
        }else{
          document.body.style.cursor = 'default'
        }
        
        var oAxisAligned = axisAligned
        DrawGyroscope()
      }
      
    </script>
  </body>
</html>
